<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Code Editor</title>
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./assets/style/style.css">
</head>
<body class="dark">
    <div class="top-bar">
        <div class="tabs">
            <button class="tab active" data-tab="html">HTML</button>
            <button class="tab" data-tab="css">CSS</button>
            <button class="tab" data-tab="js">JS</button>
        </div>
        <div class="actions">
            <button id="runBtn"><i class="fa-solid fa-play"></i> Run</button>
            <button id="clearBtn"><i class="fa-solid fa-trash"></i> Clear</button>
            <button id="downloadBtn"><i class="fa-solid fa-download"></i></button>
            <button id="copyBtn"><i class="fa-solid fa-copy"></i></button>
            <button id="fullscreenBtn"><i class="fa-solid fa-expand"></i></button>
            <button id="themeBtn"><i class="fa-solid fa-moon"></i></button>
        </div>
    </div>
    <div class="container">
        <div class="editor-panel">
            <textarea id="htmlCode" class="editor active" data-editor="html" placeholder="HTML code..."></textarea>
            <textarea id="cssCode" class="editor" data-editor="css" placeholder="CSS code..."></textarea>
            <textarea id="jsCode" class="editor" data-editor="js" placeholder="JavaScript code..."></textarea>
        </div>
        <div class="preview-panel">
            <iframe id="output" sandbox="allow-scripts"></iframe>
        </div>
    </div>

    <script src="./assets/js/app.js"></script>
</body>
</html>
