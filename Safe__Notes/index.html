<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safe Notes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Safe Notes</h1>
        <input type="password" id="password" placeholder="Enter password" />
        <textarea id="note" placeholder="Write your secret note here..."></textarea>
        <div class="buttons">
            <button id="save__note">Save</button>
            <button id="load__note">Load</button>
            <button id="clear__note">Clear</button>
            <button id="export__note">Export</button>
        </div>
        <p class="info">Works on all devices | Data is stored only on your device</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
